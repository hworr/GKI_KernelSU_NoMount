name: Setup NoMount
description: Integrate NoMount kernel-level path redirection framework
inputs:
  version:
    description: 'Kernel config version (e.g., android15-6.6)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: composite
  steps:
    - name: Derive Patch Version
      id: patch-version
      shell: bash
      run: |
        KERNEL_VER="${{ inputs.kernel_version }}"
        case "$KERNEL_VER" in
          5.10) PATCH_VER="5.10" ;;
          5.15) PATCH_VER="5.15" ;;
          6.1)  PATCH_VER="6.1" ;;
          6.6)  PATCH_VER="6.6" ;;
          6.12) PATCH_VER="6.12" ;;
          *)
            echo "Unsupported kernel version: $KERNEL_VER"
            exit 1
            ;;
        esac
        echo "patch_ver=$PATCH_VER" >> $GITHUB_OUTPUT
        echo "Selected NoMount patch for kernel $KERNEL_VER"

    - name: Copy NoMount Source Files
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        cp "${{ github.workspace }}/nomount/kernel/src/nomount.c" fs/
        cp "${{ github.workspace }}/nomount/kernel/src/nomount.h" fs/
        echo "Copied nomount.c and nomount.h to fs/"

    - name: Apply NoMount Kernel Patch
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        PATCH_FILE="${{ github.workspace }}/nomount/kernel/patches/nomount_${{ steps.patch-version.outputs.patch_ver }}_kernel_integration.patch"
        if [ ! -f "$PATCH_FILE" ]; then
          echo "ERROR: Patch file not found: $PATCH_FILE"
          exit 1
        fi
        echo "Applying $PATCH_FILE"
        patch -p1 --no-backup-if-mismatch < "$PATCH_FILE"

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_NOMOUNT=y
