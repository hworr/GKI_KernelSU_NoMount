name: Setup Wild KSU
description: Download and configure Wild KSU with version tracking
inputs:
  ksu_branch:
    description: 'KernelSU branch or commit (empty = latest master branch tip)'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download KernelSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KSU_REPO="https://github.com/KOWX712/KernelSU.git"
        KSU_INPUT="${{ inputs.ksu_branch }}"
        if [ -z "$KSU_INPUT" ]; then
          KSU_INPUT="master"
        fi

        # Clone KernelSU
        git clone --depth=1 "$KSU_REPO" KernelSU

        if [ -n "${{ inputs.ksu_branch }}" ]; then
          echo "Checking out KernelSU branch/commit: $KSU_INPUT"
          cd KernelSU
          git fetch --depth=50 origin "$KSU_INPUT"
          git checkout "$KSU_INPUT"
          cd ..
        fi

        # Determine driver directory
        DRIVER_DIR=""
        if [ -d "common/drivers" ]; then
          DRIVER_DIR="common/drivers"
        elif [ -d "drivers" ]; then
          DRIVER_DIR="drivers"
        else
          echo "ERROR: drivers/ directory not found"
          exit 1
        fi

        # Create symlink and modify build files
        ln -sf "$(realpath --relative-to="$DRIVER_DIR" "${{ github.workspace }}/kernel/KernelSU/kernel")" "$DRIVER_DIR/kernelsu"

        grep -q "kernelsu" "$DRIVER_DIR/Makefile" || printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> "$DRIVER_DIR/Makefile"
        grep -q "source \"drivers/kernelsu/Kconfig\"" "$DRIVER_DIR/Kconfig" || sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" "$DRIVER_DIR/Kconfig"

        # Set version info
        cd KernelSU/kernel
        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        BASE_VERSION=30000
        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild

        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild

    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        git fetch --depth=50 origin master 2>/dev/null || true

        KSU_GIT_VERSION=$(git rev-list --count origin/master 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 origin/master 2>/dev/null || echo "")
        KSU_COMMIT=$(git rev-parse --short origin/master 2>/dev/null)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))

        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV

    - name: Fix KernelSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        set -euo pipefail
        cp ${{ github.action_path }}/patches/static.patch "${{ github.workspace }}/kernel/KernelSU/static.patch"
        patch -p1 < static.patch

        # The patch above changes only forward declarations to non-static.
        # KOWX712's fork also has static on the actual function definitions,
        # which must match the forward declarations.
        sed -i '/^static int security_context_to_sid_with_policy/s/^static int /int /' kernel/feature/selinux_hide.c
        sed -i '/^static int security_sid_to_context_with_policy/s/^static int /int /' kernel/feature/selinux_hide.c
        sed -i '/^static void __nocfi security_compute_av_user_with_policy/s/^static void __nocfi /void __nocfi /' kernel/feature/selinux_hide.c

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
